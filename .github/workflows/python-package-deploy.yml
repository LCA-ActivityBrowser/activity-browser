---
# Inspired from:
# https://packaging.python.org/en/latest/guides/publishing-package-distribution-releases-using-github-actions-ci-cd-workflows/
name: Publish beta to PyPI and Anaconda

on:
  push:
    branches: [beta]
    tags: '*'
jobs:
  build-n-publish:
    name: Publish beta to PyPI and Anaconda
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    permissions:
      id-token: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: "0"
    # PEP 440 beta: 3.0.0b + YYYYMMDDHHMM (UTC). Sortable; no hyphens (invalid in public versions).
    - name: Set version
      run: echo "VERSION=3.0.0b$(date -u +%Y%m%d%H%M)" >> $GITHUB_ENV
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
    - name: Install pypa/build
      run: >-
        python -m
        pip install
        build
        --user
    - name: Build a binary wheel and a source tarball
      run: >-
        python -m
        build
        --outdir dist/
        .
    - name: Publish distribution 📦 to Test PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        skip-existing: true
    - name: Publish distribution 📦 to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        attestations: false
    - name: Set up Conda 3.11
      uses: conda-incubator/setup-miniconda@v3
      env:
        CONDA_NO_PLUGINS: true
      with:
        python-version: 3.11
        activate-environment: build
        environment-file: .github/conda-envs/build.yml
        conda-build-version: "*"
    - name: Configure conda channels (explicit, one-per-line)
      run: |
        # remove any preexisting malformed channels key
        conda config --remove-key channels || true
        # add channels explicitly (order matters: highest priority first)
        conda config --add channels conda-forge
        conda config --add channels lca
        conda config --add channels cmutel
        conda config --add channels mrvisscher
        # optional: show URLs when conda works
        conda config --set show_channel_urls true
    - name: Verify conda configuration
      run: |
        echo "conda info --show-config:"
        conda info --show-config
        echo "conda config --show channels:"
        conda config --show channels
        conda info
    - name: Build a Conda tarbal
      env:
        VERSION: ${{ env.VERSION }}
      run: |
        conda build -c conda-forge -c cmutel -c lca ./recipe/
    - name: Publish to Anaconda
      run: |
        anaconda -t ${{ secrets.CONDA_LCA }} upload \
        /usr/share/miniconda/conda-bld/noarch/*.conda

